<!DOCTYPE html>
<html>
<head>
<title>Leon's Performance Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Leon’s Performance Tracker</h1>

<div id="login">
<h2>Teacher Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<h2>Add Learner Performance</h2>

<input id="studentName" placeholder="Student Name">

<table>
<tr>
<th>Subject</th>
<th>Score</th>
</tr>

<tr><td>Mathematics</td><td><input type="number" class="score"></td></tr>
<tr><td>English</td><td><input type="number" class="score"></td></tr>
<tr><td>Kiswahili</td><td><input type="number" class="score"></td></tr>
<tr><td>Science</td><td><input type="number" class="score"></td></tr>
<tr><td>Social Studies</td><td><input type="number" class="score"></td></tr>
<tr><td>CRE</td><td><input type="number" class="score"></td></tr>
<tr><td>Agriculture</td><td><input type="number" class="score"></td></tr>
<tr><td>Computer Studies</td><td><input type="number" class="score"></td></tr>
<tr><td>Art & Craft</td><td><input type="number" class="score"></td></tr>

</table>

<button onclick="saveStudent()">Save Student</button>
<button onclick="downloadSheet()">Download Sheet</button>

<h2>Records</h2>
<table id="records">
<tr>
<th>Name</th>
<th>Average</th>
<th>Grade</th>
</tr>
</table>

</div>

<script src="script.js"></script>

</body>
</html>
